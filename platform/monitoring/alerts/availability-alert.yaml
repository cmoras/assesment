apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: data-pipeline-availability
  namespace: monitoring
spec:
  groups:
  - name: sli-availability
    rules:
    - alert: DataPipelineDown
      expr: up{job="data-pipeline-metrics"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "Data pipeline service is down"
        description: "The data pipeline service has been unavailable for more than 2 minutes"
