name: Application Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'platform/**'
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: data-pipeline
  EKS_CLUSTER_NAME: data-pipeline-prod

jobs:
  build:
    name: Build and Scan
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha

  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Save previous deployment
        id: previous
        run: |
          kubectl get deployment -n data-pipeline data-pipeline-app -o yaml > previous-deployment.yaml || true
        continue-on-error: true

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -k platform/k8s/overlays/prod

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/data-pipeline-app -n data-pipeline --timeout=5m

      - name: Smoke Test
        id: smoke-test
        run: |
          kubectl port-forward -n data-pipeline svc/data-pipeline-app 5000:5000 &
          PF_PID=$!
          sleep 5

          echo "Testing healthz endpoint..."
          curl -f http://localhost:5000/healthz || exit 1

          echo "Testing process endpoint..."
          curl -f -X POST http://localhost:5000/process \
            -H "Content-Type: application/json" \
            -d '{"test":"data"}' || exit 1

          kill $PF_PID
          echo "Smoke tests passed"

      - name: Rollback on failure
        if: failure() && steps.smoke-test.outcome == 'failure'
        run: |
          echo "Smoke tests failed, rolling back..."
          if [ -f previous-deployment.yaml ]; then
            kubectl apply -f previous-deployment.yaml
            kubectl rollout status deployment/data-pipeline-app -n data-pipeline --timeout=5m
          else
            echo "No previous deployment found, skipping rollback"
          fi
